name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]

defaults:
  run:
    working-directory: Kiro-account-manager

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Kiro-account-manager/package-lock.json

      - name: Install Python setuptools (for native module gyp build)
        run: python3 -m pip install setuptools --break-system-packages
        working-directory: .

      - run: npm install

      - name: Build macOS app (unpacked)
        run: npx electron-vite build && npx electron-builder --mac --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package .app as tar.gz
        run: tar czf ../Kiro-Account-Manager-macOS-arm64.tar.gz -C dist/mac-arm64 .
        working-directory: Kiro-account-manager

      - uses: actions/upload-artifact@v4
        with:
          name: Kiro-Account-Manager-macOS
          path: Kiro-Account-Manager-macOS-arm64.tar.gz
