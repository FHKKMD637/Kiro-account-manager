name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Build macOS DMG
        run: npm run build:mac

      - uses: actions/upload-artifact@v4
        with:
          name: Kiro-Account-Manager-macOS
          path: dist/*.dmg
